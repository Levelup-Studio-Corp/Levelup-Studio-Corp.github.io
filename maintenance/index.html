<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins','Apple SD Gothic Neo','Noto Sans KR',sans-serif;}
body{background:#05080c;color:white;min-height:100vh;padding:80px 20px 60px;display:flex;flex-direction:column;align-items:center;}
nav{position:fixed;top:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:16px 40px;background:rgba(5,8,12,0.8);backdrop-filter:blur(12px);border-bottom:1px solid rgba(255,255,255,0.08);z-index:100;}
.nav-logo{font-weight:700;font-size:18px;letter-spacing:2px;opacity:.7;text-decoration:none;color:white;}
.nav-back{font-size:13px;font-weight:500;letter-spacing:1px;opacity:.6;text-decoration:none;color:white;text-transform:uppercase;transition:.2s;}
.nav-back:hover{opacity:1;color:#56c4ff;}
.status-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(255,180,0,0.12);border:1px solid rgba(255,180,0,0.3);border-radius:30px;padding:8px 20px;margin-bottom:20px;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#ffb400;box-shadow:0 0 8px #ffb400;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.status-text{font-size:13px;color:#ffb400;font-weight:600;letter-spacing:1px;}
h1{font-size:32px;font-weight:700;color:#fff;margin-bottom:6px;text-align:center;}
.subtitle{font-size:14px;color:#6a8aaa;margin-bottom:36px;text-align:center;}
.card{width:100%;max-width:560px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:24px;margin-bottom:16px;}
.card-title{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;letter-spacing:1.5px;color:#56c4ff;margin-bottom:16px;text-transform:uppercase;}
.time-row{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:#c8dae8;line-height:1.6;margin-bottom:8px;}
.time-row .bullet{color:#56c4ff;font-size:16px;flex-shrink:0;margin-top:1px;}
.time-note{font-size:12px;color:#5a7a96;margin-top:4px;padding-left:18px;display:flex;align-items:flex-start;gap:6px;}
.time-note::before{content:"▸";color:#3a5a76;flex-shrink:0;}
.feature{margin-bottom:20px;}
.feature:last-child{margin-bottom:0;}
.feature-title{display:flex;align-items:flex-start;gap:10px;font-size:14px;color:#e0edf7;font-weight:600;line-height:1.5;margin-bottom:6px;}
.feature-title .bullet{color:#56c4ff;flex-shrink:0;}
.feature-desc{font-size:12px;color:#5a7a96;line-height:1.7;padding-left:18px;}
.feature-desc li{list-style:none;display:block;padding-left:14px;position:relative;margin-bottom:4px;}
.feature-desc li::before{content:"▸";color:#3a5a76;position:absolute;left:0;top:0;}
.lang-selector{position:relative;}
.lang-btn{display:inline-flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:white;font-size:12px;font-weight:600;letter-spacing:1px;cursor:pointer;transition:.2s;white-space:nowrap;}
.lang-btn:hover{background:rgba(255,255,255,0.1);}
.lang-dropdown{display:none;position:absolute;top:calc(100% + 8px);right:0;background:#0d1520;border:1px solid rgba(255,255,255,0.1);border-radius:10px;overflow:hidden;min-width:110px;z-index:200;box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.lang-dropdown.open{display:block;}
.lang-option{display:flex;align-items:center;gap:8px;padding:10px 16px;font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer;transition:.15s;color:rgba(255,255,255,0.6);}
.lang-option:hover{background:rgba(255,255,255,0.06);color:white;}
.lang-option.active{color:#56c4ff;}
footer{margin-top:40px;font-size:12px;color:#2a3a4a;}

const LANGS = [
  {code:"ko", flag:"🇰🇷"}, {code:"en", flag:"🇺🇸"}, {code:"id", flag:"🇮🇩"},
  {code:"ms", flag:"🇲🇾"}, {code:"zh", flag:"🇨🇳"}, {code:"fr", flag:"🇫🇷"},
];

function getLang() {
  const p = new URLSearchParams(window.location.search).get("lang");
  if (p && TEXTS[p]) { localStorage.setItem("lang", p); return p; }
  const saved = localStorage.getItem("lang");
  if (saved && TEXTS[saved]) return saved;
  const os = navigator.language.split("-")[0];
  return TEXTS[os] ? os : "en";
}

function setLang(code) {
  localStorage.setItem("lang", code);
  const url = new URL(window.location.href);
  url.searchParams.set("lang", code);
  window.location.href = url.toString();
}

function toggleLangMenu() {
  document.getElementById("lang-dropdown").classList.toggle("open");
}

document.addEventListener("click", e => {
  if (!e.target.closest(".lang-selector")) {
    document.getElementById("lang-dropdown").classList.remove("open");
  }
  const opt = e.target.closest(".lang-option");
  if (opt) setLang(opt.dataset.lang);
});

function updateLangUI(l) {
  const entry = LANGS.find(x => x.code === l);
  document.getElementById("lang-current").textContent = entry.flag + " " + l.toUpperCase();
  document.querySelectorAll(".lang-option").forEach(el => {
    el.classList.toggle("active", el.dataset.lang === l);
  });
}

function render() {
  const lang = getLang();
  const t = TEXTS[lang];
  const langParam = lang === "ko" ? "" : "?lang=" + lang;
  updateLangUI(lang);

  document.getElementById("nav-logo-link").href = "https://levelupstudio.co.kr/" + langParam;
  document.getElementById("nav-back-link").href = "https://levelupstudio.co.kr/ddd/" + langParam;

  document.getElementById("txt-title").textContent = t.title;
  document.getElementById("txt-subtitle").textContent = t.subtitle;
  document.getElementById("txt-time-label").textContent = t.timeLabel;
  document.getElementById("txt-timezone").textContent = t.timezone;
  document.getElementById("txt-time-note").textContent = t.timeNote;
  document.getElementById("txt-update-label").textContent = t.updateLabel;

  const container = document.getElementById("features");
  container.innerHTML = t.features.map(f => `
    <div class="feature">
      <div class="feature-title"><span class="bullet">•</span>${f.title}</div>
      <ul class="feature-desc">
        ${f.descs.map(d => `<li>${d}</li>`).join("")}
      </ul>
    </div>
  `).join("");
}

render();
