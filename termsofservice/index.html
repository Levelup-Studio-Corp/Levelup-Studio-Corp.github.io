function getLang() {
  const p = new URLSearchParams(window.location.search).get("lang");
  if (p && DOCS[p]) { localStorage.setItem("lang", p); return p; }
  const saved = localStorage.getItem("lang");
  if (saved && DOCS[saved]) return saved;
  const os = navigator.language.split("-")[0];
  return DOCS[os] ? os : "en";
}

function setLang(code) {
  localStorage.setItem("lang", code);
  const url = new URL(window.location.href);
  url.searchParams.set("lang", code);
  window.location.href = url.toString();
}

function toggleLangMenu() {
  document.getElementById("lang-dropdown").classList.toggle("open");
}

document.addEventListener("click", e => {
  if (!e.target.closest(".lang-selector")) document.getElementById("lang-dropdown").classList.remove("open");
  const opt = e.target.closest(".lang-option");
  if (opt) setLang(opt.dataset.lang);
});

function updateLangUI(l) {
  const entry = LANGS.find(x => x.code === l);
  document.getElementById("lang-current").textContent = entry.flag + " " + l.toUpperCase();
  document.querySelectorAll(".lang-option").forEach(el => el.classList.toggle("active", el.dataset.lang === l));
}

function renderContent(l) {
  const doc = DOCS[l];
  const langParam = l === "ko" ? "" : "?lang=" + l;

  document.getElementById("page-title").textContent = doc.title;
  document.getElementById("page-subtitle").textContent = doc.subtitle;
  document.getElementById("nav-logo-link").href = "https://levelupstudio.co.kr/" + langParam;

  const ref = new URLSearchParams(window.location.search).get("ref");
  const backLink = document.getElementById("nav-back-link");
  if (ref === "ddd") {
    backLink.style.display = "inline";
    backLink.href = "https://levelupstudio.co.kr/ddd/" + langParam;
  }

  let html = "";
  doc.sections.forEach(sec => {
    html += `<div class="section"><h2>${sec.h2}</h2>`;
    sec.content.forEach(item => {
      if (item.p) html += `<p>${item.p}</p>`;
      if (item.h3) html += `<h3>${item.h3}</h3>`;
      if (item.ul) html += `<ul>${item.ul.map(li => `<li>${li}</li>`).join("")}</ul>`;
    });
    html += `</div>`;
  });
  document.getElementById("doc-content").innerHTML = html;
}

function render() {
  const l = getLang();
  updateLangUI(l);
  renderContent(l);
}

render();
</script>
